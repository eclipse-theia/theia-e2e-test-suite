name: CI

on:
  push:
    branches:
      - main
  workflow_dispatch:
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 4 * * *" # Runs every day at 4am: https://docs.github.com/en/actions/reference/events-that-trigger-workflows#scheduled-events-schedule

permissions:
  pages: write
  id-token: write

jobs:
  build:
    name: E2E Tests on ubuntu-22.04 with Node.js 22.x
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Use Node.js 24.x
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 24.x
          registry-url: "https://registry.npmjs.org"

      - name: Use Python 3.13
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Build
        shell: bash
        run: npm ci

      - name: Checkout Theia
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: eclipse-theia/theia
          path: ./theia

      - name: Disable workspace trust dialog in Theia Electron
        shell: bash
        working-directory: ./theia
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('examples/electron/package.json', 'utf8'));
            if (!pkg.theia.frontend.config.preferences) { pkg.theia.frontend.config.preferences = {}; }
            pkg.theia.frontend.config.preferences['security.workspace.trust.enabled'] = false;
            fs.writeFileSync('examples/electron/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Build Theia
        shell: bash
        working-directory: ./theia
        run: |
          npm ci
          npm run build:browser
          npm run build:electron
        env:
          NODE_OPTIONS: --max_old_space_size=4096
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # https://github.com/microsoft/vscode-ripgrep/issues/9

      - name: Cache Build Result
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: build-result
        with:
          path: ./*
          key: ${{ github.run_number }}

  browser-tests:
    name: E2E Browser Tests on ubuntu-22.04 with Node.js 22.x
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    needs: [build]

    steps:
      - name: Restore Build Result (#${{ github.run_number }})
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: build-result
        with:
          path: ./*
          key: ${{ github.run_number }}
          fail-on-cache-miss: true

      - name: Use Node.js 24.x
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 24.x
          registry-url: "https://registry.npmjs.org"

      - name: Use Python 3.13
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Install Playwright Chromium
        shell: bash
        run: npx playwright install chromium

      - name: Run Theia
        shell: bash
        working-directory: ./theia/examples/browser
        run: npm run start &

      - name: Test (playwright browser)
        shell: bash
        run: npm run ui-tests-ci

      - name: Upload test results (browser)
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: ui-tests-browser-${{ github.run_number }}
          path: allure-results/*

  electron-tests:
    name: E2E Electron Tests on ubuntu-22.04 with Node.js 22.x
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    needs: [build]

    steps:
      - name: Restore Build Result (#${{ github.run_number }})
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        id: build-result
        with:
          path: ./*
          key: ${{ github.run_number }}
          fail-on-cache-miss: true

      - name: Use Node.js 24.x
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 24.x
          registry-url: "https://registry.npmjs.org"

      - name: Use Python 3.13
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"

      - name: Install Playwright Chromium
        shell: bash
        run: npx playwright install chromium

      - name: Test (playwright electron)
        shell: bash
        run: xvfb-run npm run ui-tests-ci-electron
        env:
          NODE_PATH: ./theia/node_modules

      - name: Upload test results (electron)
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: ui-tests-electron-${{ github.run_number }}
          path: allure-results/*

  generate-report:
    name: Generate Report of E2E Electron Tests
    runs-on: ubuntu-22.04
    needs: [browser-tests, electron-tests]

    steps:
      - name: Get History
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: always() && github.ref == 'refs/heads/main'
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Download test results
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: allure-results
          pattern: ui-tests-*-${{ github.run_number }}
          merge-multiple: true

      - name: Generate Report
        uses: simple-elf/allure-report-action@53ebb757a2097edc77c53ecef4d454fc2f2f774c # v1.13
        if: always() && github.ref == 'refs/heads/main'
        with:
          allure_results: allure-results
          allure_history: allure-history
          keep_reports: 100
          subfolder: allure

      - name: Upload Pages Artifact
        if: always() && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: allure-history

  deploy-report:
    name: Deploy Report to GitHub Pages
    runs-on: ubuntu-22.04
    needs: [generate-report]
    if: always() && github.ref == 'refs/heads/main'
    environment: github-pages
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
